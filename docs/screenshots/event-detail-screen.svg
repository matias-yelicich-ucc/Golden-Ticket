<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#191611"/>
    </linearGradient>
    <style>
      .card { fill: #171717; stroke: rgba(212,175,55,0.28); stroke-width: 2; }
      .title { font: 700 56px Arial, sans-serif; fill: #f7f3eb; }
      .text { font: 500 22px Arial, sans-serif; fill: #d7d0c4; }
      .subtitle { font: 700 30px Arial, sans-serif; fill: #f7f3eb; }
      .accent { fill: #d4af37; }
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="70" y="105" class="title">Conferencia Tech Summit 2026</text>
  <text x="70" y="150" class="text">Detalle del evento, ubicacion, disponibilidad y compra de entradas.</text>
  <rect x="70" y="210" width="680" height="160" rx="24" class="card"/>
  <rect x="790" y="210" width="540" height="160" rx="24" class="card"/>
  <rect x="70" y="410" width="820" height="280" rx="24" class="card"/>
  <rect x="930" y="410" width="400" height="280" rx="24" class="card"/>
  <text x="110" y="275" class="subtitle">Fecha y horario</text>
  <text x="110" y="320" class="text">18/07/2026 - 09:00 a 18:00</text>
  <text x="830" y="275" class="subtitle">Disponibilidad</text>
  <text x="830" y="320" class="text">Capacidad: 500 personas</text>
  <text x="830" y="355" class="text">Entradas disponibles: 498</text>
  <text x="110" y="475" class="subtitle">Ubicacion</text>
  <text x="110" y="520" class="text">Centro de Convenciones Cordoba</text>
  <rect x="110" y="555" width="740" height="95" rx="18" fill="#222"/>
  <text x="970" y="475" class="subtitle">Entrada General</text>
  <text x="970" y="520" class="text">$ 5.000</text>
  <rect x="970" y="585" width="320" height="58" rx="16" class="accent"/>
</svg>

