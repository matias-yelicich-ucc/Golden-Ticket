<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#1a1713"/>
    </linearGradient>
    <style>
      .card { fill: #171717; stroke: rgba(212,175,55,0.3); stroke-width: 2; }
      .title { font: 700 54px Arial, sans-serif; fill: #f7f3eb; }
      .text { font: 500 22px Arial, sans-serif; fill: #d7d0c4; }
      .strong { font: 700 34px Arial, sans-serif; fill: #f7f3eb; }
      .btn { stroke: rgba(212,175,55,0.28); stroke-width: 1.5; }
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="70" y="100" class="title">Mis entradas</text>
  <text x="70" y="145" class="text">Consulta, transferencia y cancelacion de tickets comprados.</text>
  <rect x="70" y="215" width="1260" height="180" rx="24" class="card"/>
  <text x="110" y="295" class="strong">Conferencia Tech Summit 2026</text>
  <text x="110" y="340" class="text">18/07/2026 - 09:00</text>
  <text x="110" y="375" class="text">Centro de Convenciones Cordoba</text>
  <text x="680" y="280" class="text">Codigo de entrada</text>
  <text x="680" y="350" style="font:700 74px Arial,sans-serif; fill:#fffdf7;">#16</text>
  <rect x="680" y="360" width="130" height="44" rx="22" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.35)" stroke-width="1.5"/>
  <text x="720" y="389" text-anchor="middle" style="font:700 22px Arial,sans-serif; fill:#6be892;">Activo</text>
  <rect x="1000" y="250" width="270" height="54" rx="16" fill="#d4af37" class="btn"/>
  <rect x="1000" y="320" width="270" height="54" rx="16" fill="#25231f" class="btn"/>
  <rect x="1000" y="390" width="270" height="54" rx="16" fill="#2b1d1d" stroke="rgba(239,68,68,0.28)" stroke-width="1.5"/>
</svg>

